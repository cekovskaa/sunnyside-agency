<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Sunnyside agency</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Fraunces:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid px-5 py-3">
          <a class="navbar-brand" href="#">
            <img src="./images/logo.svg" alt="Sunny side brand logo" />
          </a>
          <button
            id="mobileNavToggle"
            class="navbar-toggler"
            type="button"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
          <div
            class="navbar-collapse nav-dropdown"
            id="navbarNav"
            aria-hidden="true"
          >
            <ul class="navbar-nav nav-dropdown-links">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="#">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Services</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Projects</a>
              </li>
              <li class="nav-item">
                <button class="btn btn-custom">Contact</button>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <h1 class="text-center main-heading">We Are Creatives</h1>

      <div class="arrow-down">
        <img src="./images/icon-arrow-down.svg" alt="Arrow down image" />
      </div>
    </header>

    <script src="./js/index.js" defer></script>
  </body>
</html>
